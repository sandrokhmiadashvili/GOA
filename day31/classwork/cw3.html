<!DOCTYPE html>
<html>
<head>
    <title>Text Decoration</title>

    <style>
        p{
            text-decoration: line-through;
            text-decoration-style: dotted;
            text-decoration-color: green;

            font-size: 30px;
        }
    </style>
</head>

<body>

    <p>
        This is a paragraph
    </p>

</body>
</html>
