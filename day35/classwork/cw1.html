<!DOCTYPE html>
<html>
<head>
    <title>Tables</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>GeeksforGeeks</h1>
    <p>The TH element defines table headers.</p>

    <table class="table1">
        <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Roll No</th>
        </tr>
        <tr>
            <td>Mahima</td>
            <td>10</td>
            <td>1</td>
        </tr>
        <tr>
            <td>Krishn</td>
            <td>8</td>
            <td>3</td>
        </tr>
        <tr>
            <td>Shivika</td>
            <td>8</td>
            <td>5</td>
        </tr>
    </table>

    <h2>Employee Table</h2>

    <table class="table2">
        <tr>
            <th>EmpId</th>
            <th>EmpName</th>
            <th>EmpDept</th>
            <th>EmpSalary</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Joe</td>
            <td>Development</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Mary</td>
            <td>Testing</td>
            <td>30000</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Beck</td>
            <td>Analyst</td>
            <td>40000</td>
        </tr>
        <tr>
            <td>104</td>
            <td>Candace</td>
            <td>Development</td>
            <td>45000</td>
        </tr>
    </table>

</body>
</html>
