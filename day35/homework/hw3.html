<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #0055af;
        }

        table {
            border-collapse: collapse;
            width: 800px;
            color: rgba(255, 255, 255, 0.716);
        }

        th {
            color: rgb(144, 144, 8);
            padding: 20px;
            text-align: left;
        }

        td {
            padding: 20px;
        }
    </style>
</head>
<body>
    <table>
    <tr>
        <th>Movie Title</th>
        <th>Genre</th>
        <th>Year</th>
        <th>Gross</th>
    </tr>

    <tr>
        <td>Star Wars</td>
        <td>Adventure, Sci-fi</td>
        <td>1977</td>
        <td>$460,935,665</td>
    </tr>

    <tr>
        <td>Howard The Duck</td>
        <td>"Comedy"</td>
        <td>1986</td>
        <td>$16,295,774</td>
    </tr>

    <tr>
        <td>American Graffiti</td>
        <td>Comedy, Drama</td>
        <td>1973</td>
        <td>$115,000,000</td>
    </tr>
</table>
</body>
</html>
