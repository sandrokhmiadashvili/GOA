<!DOCTYPE html>
<html>
<head>
    <style>
        table{
            border-collapse: separate;
            border-spacing: 10px;
        }

        th, td{
            border: 2px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>სახელი</th>
            <th>გვარი</th>
            <th>ასაკი</th>
            <th>ქალაქი</th>
        </tr>

        <tr>
            <td>სანდრო</td>
            <td>ხმიადაშვილი</td>
            <td>15</td>
            <td>თბილისი</td>
        </tr>

        <tr>
            <td>ნიკა</td>
            <td>მანუკოვი</td>
            <td>16</td>
            <td>ბათუმი</td>
        </tr>

        <tr>
            <td>დათო</td>
            <td>რობაქიძე</td>
            <td>17</td>
            <td>კახეთი</td>
        </tr>
    </table>

</body>
</html>
