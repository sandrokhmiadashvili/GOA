<!DOCTYPE html>
<html>
<head>
    <title>ფორმა</title>
    <style>
        input[type="text"]{
            border: 2px solid rgb(255, 140, 0);
            border-radius: 5px;
        }

        input[type="number"]{
            border: 2px dashed rgb(72, 4, 76);
        }

        input[type="email"]{
            border: 3px dotted rgba(112, 228, 45, 0.684);
        }

        input[type="tel"]{
            border: 3px double rgb(145, 255, 239);
        }

        input[type="password"]{
            border: 3px groove red;
        }

        input{
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <form>
        <label>სახელი:</label><br>
        <input type="text"><br>

        <label>გვარი:</label><br>
        <input type="text"><br>

        <label>ასაკი:</label><br>
        <input type="number"><br>

        <label>მეილი:</label><br>
        <input type="email"><br>

        <label>ტელეფონის ნომერი:</label><br>
        <input type="tel"><br>

        <label>პაროლი:</label><br>
        <input type="password"><br><br>

        <input type="submit" value="გაგზავნა">
    </form>

</body>
</html>
