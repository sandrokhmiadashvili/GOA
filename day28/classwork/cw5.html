<!-- HTML ფაილში: დაამატე სათაური (h1) დაამატე ორი პარაგრაფი (p) / გამოიყენე Internal CSS (style თეგის გამოყენებით head-ში) და შეცვალე: • პარაგრაფის ტექსტის ფერი (color) • პარაგრაფის ფონური ფერი (background-color) • heading-ის ტექსტის განლაგება (text-align)  -->

<!DOCTYPE html>
<html>
<head>
<style>

    h1 {
text-align: center;
    }


    p {
    color: white;               
    background-color: black;   
    }
</style>

</head>
<body>

<h1>sandro</h1>

<p>sandro</p>
<p>sandro</p>

</body>
</html>
